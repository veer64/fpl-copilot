name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd fpl-copilot
            git pull
            docker build -t fpl-copilot .
            docker stop fpl-copilot || true
            docker rm fpl-copilot || true
            docker run -d -p 8000:8000 --name fpl-copilot fpl-copilot
